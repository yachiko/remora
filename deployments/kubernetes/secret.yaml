apiVersion: v1
kind: Secret
metadata:
  name: remora-secrets
  namespace: remora
  labels:
    app: remora
type: Opaque
stringData:
  # Database Credentials
  DATABASE_USER: "remora_user"
  DATABASE_PASSWORD: "CHANGE_ME_IN_PRODUCTION"

  # GitHub App Configuration
  # Base64 encode these values before applying
  GITHUB_APP_ID: "123456"
  GITHUB_APP_PRIVATE_KEY: |
    -----BEGIN RSA PRIVATE KEY-----
    CHANGE_ME_IN_PRODUCTION
    -----END RSA PRIVATE KEY-----
  GITHUB_WEBHOOK_SECRET: "CHANGE_ME_IN_PRODUCTION"

  # Admin API Secret (optional)
  REMORA_API_SECRET: "CHANGE_ME_IN_PRODUCTION"

---
# Note: For production, create secrets using kubectl:
#
# kubectl create secret generic remora-secrets \
#   --from-literal=DATABASE_USER=remora_user \
#   --from-literal=DATABASE_PASSWORD=your_secure_password \
#   --from-literal=GITHUB_APP_ID=123456 \
#   --from-file=GITHUB_APP_PRIVATE_KEY=./github-app-key.pem \
#   --from-literal=GITHUB_WEBHOOK_SECRET=your_webhook_secret \
#   --from-literal=REMORA_API_SECRET=your_api_secret \
#   -n remora

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: remora

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - configmap.yaml
  - secret.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml

commonLabels:
  app: remora
  managed-by: kustomize

images:
  - name: remora
    newName: your-registry/remora  # Update with your registry
    newTag: latest  # Update with your version tag

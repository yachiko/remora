name: Build

on:
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --timeout=5m

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Download dependencies
        run: go mod download

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Run tests
        run: gotestsum --format pkgname --hide-summary=skipped --junitfile=test-report.xml -- -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-report
          path: test-report.xml
          retention-days: 7

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.txt
          flags: unittests
          name: codecov-umbrella

  build:
    name: Build Binary
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Build binary
        run: |
          mkdir -p bin
          go build -v -o bin/remora ./cmd/remora

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: remora-binary
          path: bin/remora
          retention-days: 7

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./deployments/docker/Dockerfile
          push: false
          load: true
          tags: remora:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test container
        run: |
          # Start container in background
          docker run -d --name remora-test \
            -p 8080:8080 \
            -e REMORA_GITHUB_WEBHOOK_SECRET=test-secret \
            -e REMORA_GITHUB_APP_ID=12345 \
            -e REMORA_GITHUB_PRIVATE_KEY="$(openssl genrsa 2048 2>/dev/null)" \
            remora:test

          # Wait for container to be ready
          echo "Waiting for container to start..."
          for i in {1..30}; do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "Container is healthy!"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Container failed to become healthy"
              docker logs remora-test
              exit 1
            fi
            sleep 1
          done

          # Cleanup
          docker stop remora-test
          docker rm remora-test
